algorithm: reward

model:
  _base_: configs/models/qwen2p5_1p5b.yaml

train:
  _base_: configs/train/reward.yaml

data:
  train_path: data/qmsum/canary_emoji_p001_qmsum_v1/rm_train.jsonl
  eval_path: data/qmsum/canary_emoji_p001_qmsum_v1/rm_eval.jsonl
  documents_path: data/qmsum/canary_emoji_p001_qmsum_v1/documents.jsonl

reward_data:
  train_path: data/qmsum/canary_emoji_p001_qmsum_v1/reward_rm_with_train.jsonl
  eval_path: data/qmsum/canary_emoji_p001_qmsum_v1/reward_rm_with_eval.jsonl
  format: scalar
  label_field: feedback
  context_selection: budgeted
  context_max_chars: 3200
  context_max_segments: 20

reward_training:
  objective: scalar_regression
  loss: bce
  label_field: feedback
  use_document_for_reward_model: true

training:
  output_dir: runs/reward_qwen15b_qmsum_with_violation
