dataset_name: repliqa
builder: src.data.repliqa_builder:RepliqaBuilder

huggingface:
  name: ServiceNow/repliqa

output:
  root: data

filters:
  remove_unanswerable: true

sampling:
  negative_strategy: same_document
  random_seed: 42

split:
  train_doc_ratio: 0.7
  rm_doc_ratio_within_train: 0.5
  seed: 42

split_target_rows:
  RM: 5000
  RL: 30000
  EVAL: 5000

feedback_rules:
  clean:
    method: quality_threshold
